<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘도 커마카세 ☕</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- ✅ AdSense 승인 후 주석 해제 + ca-pub-XXX 교체 -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>

  <header>
    <div class="logo-tag">☕ Omakase</div>
    <h1>오늘도<br><em>커마카세</em></h1>
    <p>오늘의 나에게 딱 맞는<br>카페 음료를 찾아드려요</p>
    <div class="divider"></div>
  </header>

  <!-- 상단 광고 슬롯 -->
  <div class="ad-slot">
    <!-- ✅ AdSense 승인 후 아래 ins 태그 주석 해제
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-placeholder">AD SLOT — 상단 배너</div>
  </div>

  <main>

    <!-- 질문 화면 -->
    <div id="quiz-screen">
      <div class="progress-wrap" id="progress"></div>
      <div class="card" id="question-card"></div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen">
      <div class="result-card" id="result-card">
        <div class="result-label">오늘의 커마카세</div>
        <span class="result-emoji" id="res-emoji"></span>
        <div class="result-drink" id="res-drink"></div>
        <div class="result-sub" id="res-sub"></div>
        <div class="result-desc" id="res-desc"></div>
        <div class="tags" id="res-tags"></div>

        <div class="share-row">
          <button class="share-btn share-kakao" onclick="shareKakao()">💬 카카오톡</button>
          <button class="share-btn share-insta" onclick="saveImage()">📸 이미지 저장</button>
          <button class="share-btn share-copy" onclick="copyLink()">🔗 링크복사</button>
        </div>

        <button class="retry-btn" onclick="restart()">↩ 다시 추천받기</button>

        <!-- ✅ AdSense 승인 후 아래 ins 태그 주석 해제
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        -->
        <div class="ad-result">AD SLOT — 결과 하단 배너</div>
      </div>
    </div>

  </main>

  <footer>© 2026 오늘도 커마카세 · All rights reserved</footer>
  <div class="toast" id="toast">링크가 복사됐어요! ☕</div>

  <!-- JS 파일 로딩 순서 중요: data → quiz → result -->
  <script src="data.js"></script>
  <script src="quiz.js"></script>
  <script src="result.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
